name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        env:
          OPENAI_API_KEY: sk-test-fake-key
          ADMIN_API_KEY: test-admin-key
        run: pytest tests/ -v --tb=short

      - name: Check code style (ruff)
        run: |
          pip install ruff
          ruff check app/ tests/ --select E,F,W --ignore E501

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rag-support:ci ./backend

      - name: Test Docker health endpoint
        run: |
          docker run -d --name rag_test \
            -e OPENAI_API_KEY=sk-test \
            -e ADMIN_API_KEY=test \
            -p 8000:8000 rag-support:ci
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop rag_test
